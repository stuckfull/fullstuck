<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .sidebar { width: 250px; float: left; background: #333; color: #fff; height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { margin-top: 0; color: #4a90e2; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin-bottom: 10px; }
        .sidebar a { color: #ccc; text-decoration: none; }
        .sidebar a:hover { color: #fff; }
        .main-content { margin-left: 250px; padding: 20px; }
        header { margin-bottom: 30px; }
        #page-title { margin: 0 0 5px 0; color: #333; }
        .greeting { margin: 0; color: #666; }
        .stat-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #fff; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid #4a90e2; }
        .stat-title { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; }
        .stat-value { margin: 0; font-size: 28px; color: #333; }
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: #666; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.active { background: #d4edda; color: #155724; }
        .badge.inactive { background: #f8d7da; color: #721c24; }
        .btn-edit { background: #4a90e2; color: white; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 12px; }
        .btn-edit:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <ul>
            <li><a href="?page=dashboard">Dashboard Utama</a></li>
            <li><a href="?page=profile">Profil Saya</a></li>
        </ul>
    </div>
    <div class="main-content">
        <header>
            <h1 id="page-title">Dashboard Title</h1>
            <p class="greeting">Greeting text...</p>
        </header>

        <div class="stat-grid">
            <!-- Elemen ini akan menjadi template loop untuk stat-card -->
            <div class="stat-card">
                <h3 class="stat-title">Label</h3>
                <h2 class="stat-value">0</h2>
            </div>
            
            <!-- Dummy stat-card yang akan dihapus otomatis -->
            <div class="stat-card">
                <h3 class="stat-title">Dummy Stat</h3>
                <h2 class="stat-value">999</h2>
            </div>
        </div>

        <section class="user-list">
            <h2>Pengguna Terbaru</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Elemen ini akan menjadi template loop pengguna -->
                    <tr class="user-row">
                        <td class="user-id">#ID</td>
                        <td class="user-name">Full Name</td>
                        <td class="user-email">email@domain.com</td>
                        <td><span class="badge status-badge">Unknown</span></td>
                        <td>
                            <a href="#" class="btn-edit" data-id="0">Edit</a>
                        </td>
                    </tr>
                    
                    <!-- Dummy tr yang akan dihapus otomatis -->
                    <tr class="user-row">
                        <td>#Dummy</td>
                        <td>John Dummy</td>
                        <td>dummy@domain.com</td>
                        <td><span class="badge">N/A</span></td>
                        <td><a href="#">Edit</a></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
